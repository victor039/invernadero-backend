<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Invernadero" />
    <title>Invernadero</title>
    <style>
      .boot-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at top, rgba(16, 185, 129, 0.18), transparent 32rem),
          radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.16), transparent 28rem),
          #020617;
        color: #e2e8f0;
        transition: opacity 260ms ease, transform 260ms ease;
      }

      .boot-splash--hidden {
        opacity: 0;
        transform: scale(1.02);
        pointer-events: none;
      }

      .boot-splash__panel {
        width: min(92vw, 28rem);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 1rem;
        background: rgba(15, 23, 42, 0.68);
        box-shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
        backdrop-filter: blur(18px);
        padding: 1.5rem;
        text-align: center;
      }

      .boot-splash__logo {
        width: 4rem;
        height: 4rem;
        margin: 0 auto;
        border-radius: 0.9rem;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #10b981, #0f766e);
        box-shadow: 0 10px 30px rgba(16, 185, 129, 0.24);
      }

      .boot-splash__title {
        margin: 1rem 0 0;
        font-size: 1.6rem;
        line-height: 1.2;
        font-weight: 800;
        color: #f8fafc;
      }

      .boot-splash__text {
        margin: 0.65rem 0 0;
        color: #cbd5e1;
        font-size: 0.95rem;
        line-height: 1.6;
      }

      .boot-splash__bar {
        height: 0.38rem;
        margin-top: 1.25rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .boot-splash__bar::before {
        content: '';
        display: block;
        width: 40%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #10b981, #38bdf8);
        animation: boot-splash-slide 1.2s ease-in-out infinite;
      }

      @keyframes boot-splash-slide {
        0% { transform: translateX(-120%); }
        50% { transform: translateX(75%); }
        100% { transform: translateX(220%); }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" class="boot-splash" aria-live="polite">
      <div class="boot-splash__panel">
        <div class="boot-splash__logo">
          <img src="/favicon.svg" alt="" width="34" height="34" />
        </div>
        <h1 class="boot-splash__title">Invernadero</h1>
        <p class="boot-splash__text">Preparando tu panel y sincronizando la interfaz con Render.</p>
        <div class="boot-splash__bar" aria-hidden="true"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
